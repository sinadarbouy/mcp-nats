{{- if and .Values.auth.createSecret (or .Values.auth.secretData.user .Values.auth.secretData.password) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-nats.fullname" . }}
  namespace: {{ include "mcp-nats.namespace" . }}
  labels:
    {{- include "mcp-nats.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
type: Opaque
data:
  {{- if .Values.auth.secretData.user }}
  NATS_USER: {{ .Values.auth.secretData.user | toString | b64enc }}
  {{- end }}
  {{- if .Values.auth.secretData.password }}
  NATS_PASSWORD: {{ .Values.auth.secretData.password | toString | b64enc }}
  {{- end }}
{{- end }}
